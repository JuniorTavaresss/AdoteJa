<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AdoteJá</title>

<link rel="stylesheet" href="../style/Telalogin.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<!-- LOGO GLOBAL (VOLTA PRO INÍCIO) -->
<a href="../Index.html" class="logo-topo">🐶 AdoteJá</a>

<div class="login-container">

    <div class="login-header">
        <div class="logo">🐶 Adote<span>Já</span></div>
        <p>Conectando pessoas a animais que precisam de um lar ❤️</p>
    </div>

    <form id="loginForm">

        <div class="input-group">
            <label>E-mail</label>
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="login-options">
            <label><input type="checkbox"> Lembrar-me</label>
            <a href="#" class="forgot-link">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn-login">
            <i class="fas fa-paw"></i> Entrar
        </button>

    </form>

    <div class="register-prompt">
        <p>Ainda não tem uma conta?</p>

        <div class="botoes-cadastro">

            <a href="../Cadastro/cadastro.html" class="btn-cadastro usuario">
                👤 Criar conta
            </a>

            <a href="../Cadastro/cadastroong.html" class="btn-cadastro ong">
                🏢 Cadastrar ONG
            </a>

        </div>
    </div>

    <div class="security-note">
        <i class="fas fa-shield-alt"></i>
        Adoção segura – seus dados são protegidos.
    </div>

</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('password').value.trim();

    if(email === "" || senha === "") {
        alert("Preencha e-mail e senha.");
    } else {
        alert(`Login realizado para: ${email}`);
    }
});
</script>

</body>
</html>
