<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Usuário | AdoteJá</title>

<link rel="stylesheet" href="../style/cadastro.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- LOGO GLOBAL (VOLTA PRO INÍCIO) -->
<a href="../Index.html" class="logo-topo">🐶 AdoteJá</a>

<div class="container">

    <div class="box">

        <!-- HEADER -->
        <div class="header">
            <h1>🐶 AdoteJá</h1>
            <p>Crie sua conta para adotar um pet ❤️</p>
        </div>

        <!-- FORM -->
<form action="../php/salvar_usuario.php" method="POST">
    <div class="input-group">
        <label>Nome completo</label>
        <input type="text" name="nome" placeholder="Seu nome" required>
    </div>

    <div class="input-group">
        <label>E-mail</label>
        <input type="email" name="email" placeholder="seu@email.com" required>
    </div>

    <div class="input-group">
        <label>Senha</label>
        <input type="password" name="senha" placeholder="••••••••" required>
    </div>

    <div class="input-group">
        <label>Confirmar senha</label>
        <input type="password" name="confirmar_senha" placeholder="••••••••" required>
    </div>

    <div class="input-group">
        <label>Cidade</label>
        <input type="text" name="cidade" placeholder="Sua cidade" required>
    </div>

    <button type="submit">Cadastrar</button>

</form>

        <!-- VOLTAR -->
        <div class="footer">
            Já tem conta? <a href="../html/Telalogin.html">Entrar</a>
        </div>

    </div>

</div>

</body>
</html>
