<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção | AdoteJá</title>
    <link rel="stylesheet" href="../style/adocao.css">
</head>
<body>

<!-- HEADER AZUL -->
<header class="navbar">
    <a href="../Index.html" class="logo-topo">🐶 AdoteJá</a>

    <<nav class="nav-links">
    <button class="btn-cadastrar-cao" onclick="window.location.href='../html/CadastrarCao.html'">
        + Cadastrar Cão
    </button>
</nav>
</header>

<!-- FILTROS - ÁREA AZUL -->
<section class="filtros">
    <div class="filtros-container">
        <h2>Encontre seu pet ideal</h2>
        <div class="filtro-box">
            <select id="filtroTamanho">
                <option value="">Tamanho</option>
                <option value="Pequeno">Pequeno</option>
                <option value="Médio">Médio</option>
                <option value="Grande">Grande</option>
            </select>

            <select id="filtroRaca">
                <option value="">Raça</option>
                <option value="Vira-lata">Vira-lata</option>
                <option value="Labrador">Labrador</option>
                <option value="Pitbull">Pitbull</option>
            </select>

            <select id="filtroCastrado">
                <option value="">Castrado</option>
                <option value="Sim">Sim</option>
                <option value="Não">Não</option>
            </select>

            <select id="filtroCidade">
                <option value="">Cidade</option>
                <option value="Araranguá - SC">Araranguá - SC</option>
                <option value="Criciúma - SC">Criciúma - SC</option>
                <option value="Florianópolis - SC">Florianópolis - SC</option>
            </select>

            <button id="btnFiltrar">Filtrar</button>
            <button id="btnLimparFiltros" class="btn-limpar">Limpar</button>
        </div>
    </div>
</section>

<!-- LISTA DE PETS -->
<section class="lista-pets">
    <div class="grid" id="gridPets">
        <!-- Os cards serão gerados dinamicamente pelo JavaScript -->
    </div>
</section>

<!-- RODAPÉ SIMPLES E REDUZIDO -->
<footer class="footer">
    <div class="footer-content">
        <div class="footer-info">
            <p>🐾 AdoteJá © 2026 | Transformando vidas através da adoção responsável</p>
            <p>contato@adoteja.com | (48) 99999-9999</p>
        </div>
    </div>
</footer>

<script src="../javascript/adocao.js"></script>
</body>
</html>
