<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perdi meu Pet | AdoteJá</title>

<link rel="stylesheet" href="../style/perdipet.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- MENU -->
<nav class="menu">
    <a href="../Index.html" class="logo">🐶 AdoteJá</a>
</nav>

<!-- HEADER -->
<header class="header">
    <h1>🐾 Perdi meu Pet</h1>
    <p>Cadastre informações para ajudar a encontrar seu animal</p>
</header>

<!-- FORMULÁRIO -->
<div class="container">

    <form>

        <label>📸 Foto do Pet</label>
        <input type="file" accept="image/*">

        <label>🐶 Nome do Pet</label>
        <input type="text" placeholder="Ex: Thor">

        <label>📍 Local onde foi perdido</label>
        <input type="text" placeholder="Ex: Bairro Centro, Criciúma">

        <label>📅 Data</label>
        <input type="date">

        <label>📞 Telefone para contato</label>
        <input type="tel" placeholder="(48) 99999-9999">

        <label>📝 Descrição</label>
        <textarea placeholder="Cor, raça, tamanho, características..."></textarea>

        <button type="submit">Registrar Pet Perdido</button>

    </form>

</div>

</body>
</html>
