<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perdi meu Pet | AdoteJá</title>

<link rel="stylesheet" href="../style/perdipet.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- MENU -->
<nav class="menu">
    <a href="../Index.html" class="logo">🐶 AdoteJá</a>
</nav>

<!-- HEADER -->
<header class="header">
    <h1>🐾 Perdi meu Pet</h1>
    <p>Cadastre informações para ajudar a encontrar seu animal</p>
</header>

<!-- FORMULÁRIO -->
<div class="container">

<form action="../php/salvar_perdipet.php" method="POST" enctype="multipart/form-data">

    <label for="foto">📸 Foto do Pet</label>
    <input type="file" id="foto" name="foto" accept="image/*" required>

    <label for="nome_pet">🐶 Nome do Pet</label>
    <input type="text" id="nome_pet" name="nome_pet" placeholder="Ex: Thor" required>

    <label for="local_perdido">📍 Local onde foi perdido</label>
    <input type="text" id="local_perdido" name="local_perdido" placeholder="Ex: Bairro Centro, Criciúma" required>

    <label for="data_perdido">📅 Data</label>
    <input type="date" id="data_perdido" name="data_perdido" required>

    <label for="telefone">📞 Telefone para contato</label>
    <input type="tel" id="telefone" name="telefone" placeholder="(48) 99999-9999" required>

    <label for="descricao">📝 Descrição</label>
    <textarea id="descricao" name="descricao" placeholder="Cor, raça, tamanho, características..."></textarea>

    <button type="submit">Registrar Pet Perdido</button>

</form>

</div>

</body>
</html>
