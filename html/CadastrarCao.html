<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Cão | AdoteJá</title>
    <link rel="stylesheet" href="../style/CadastrarCao.css">
</head>
<body>

    <header class="navbar">
        <a href="../Index.html" class="logo-topo">🐶 AdoteJá</a>
    </header>
    <main class="container">
        <form id="formCadastrarCao" class="formulario">
            <h1>Cadastrar Novo Cão</h1>

            <label>Nome do cão</label>
            <input type="text" id="nome" required>

            <label>Raça</label>
            <input type="text" id="raca" required>

            <label>Idade</label>
            <input type="number" id="idade" min="0" required>

            <label>Tamanho</label>
            <select id="tamanho" required>
                <option value="">Selecione</option>
                <option value="Pequeno">Pequeno</option>
                <option value="Médio">Médio</option>
                <option value="Grande">Grande</option>
            </select>

            <label>Cidade</label>
            <input type="text" id="cidade" required>

            <label>Castrado</label>
            <select id="castrado" required>
                <option value="">Selecione</option>
                <option value="Sim">Sim</option>
                <option value="Não">Não</option>
            </select>

            <label>Descrição</label>
            <textarea id="descricao" rows="4" required></textarea>

            <label>Foto do cão</label>
            <input type="file" id="foto" accept="image/*">

            <button type="submit">Cadastrar</button>
        </form>
    </main>

    <script src="../javascript/CadastrarCao.js"></script>
</body>
</html>
