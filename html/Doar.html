<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doação | AdoteJá</title>

<link rel="stylesheet" href="../style/Doar.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- MENU -->
<nav class="menu">
    <a href="../index.html" class="logo">🐶 AdoteJá</a>
</nav>

<!-- HEADER -->
<div class="header">
    🐾 Doação para ONGs - AdoteJá
</div>

<!-- CONTEÚDO -->
<div class="container">

    <h2>Ajude um Pet 🐶</h2>
    <p>Todo o valor arrecadado será destinado às ONGs parceiras para ajudar cães resgatados.</p>

    <!-- VALORES -->
    <div class="valores">
        <button>R$10</button>
        <button>R$25</button>
        <button>R$50</button>
        <button>R$100</button>
    </div>

    <!-- FORM -->
    <input type="text" placeholder="Seu nome">
    <input type="email" placeholder="Seu e-mail">
    <input type="number" placeholder="Valor personalizado (R$)">

    <button class="btn-doar">Fazer Doação ❤️</button>

    <div class="info">
        🔒 Doação segura • 100% destinada às ONGs
    </div>

</div>

</body>
</html>
